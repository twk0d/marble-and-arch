<script>
        // Simple script to toggle password visibility
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButtons = document.querySelectorAll('button:has(.material-symbols-outlined:contains("visibility"))');
            // Assuming the structure is consistent, finding the button within the password group
            const passGroups = document.querySelectorAll('input[type="password"]');
            
            passGroups.forEach(input => {
                const btn = input.parentElement.querySelector('button');
                if(btn) {
                    btn.addEventListener('click', () => {
                        const icon = btn.querySelector('.material-symbols-outlined');
                        if (input.type === 'password') {
                            input.type = 'text';
                            icon.textContent = 'visibility';
                        } else {
                            input.type = 'password';
                            icon.textContent = 'visibility_off';
                        }
                    });
                }
            });
        });
    </script>
