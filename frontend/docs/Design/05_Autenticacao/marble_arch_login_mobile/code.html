<style>
        .input-underline {

            border: none;

</div>

<!-- Login Form Section -->
<main class="flex-1 flex flex-col px-margin-mobile pt-8 pb-12 z-10 -mt-6 rounded-t-[32px] bg-background relative">
<div class="mb-10 text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-secondary">Sign in to access your curated portfolio.</p>
</div>
<form class="flex flex-col gap-8 w-full max-w-sm mx-auto">
<!-- Email Field -->
<div class="relative pt-4">
<input class="input-underline w-full font-body-md text-body-md text-on-surface placeholder-transparent h-10" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="label-floating absolute left-0 top-6 font-label-sm text-label-sm text-on-surface-variant pointer-events-none" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative pt-4">
<input class="input-underline w-full font-body-md text-body-md text-on-surface placeholder-transparent h-10" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="label-floating absolute left-0 top-6 font-label-sm text-label-sm text-on-surface-variant pointer-events-none" for="password">Password</label>
<button class="absolute right-0 top-6 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end -mt-4">
<a class="font-label-sm text-label-sm text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Sign In Button -->
<button class="w-full mt-4 py-4 px-6 bg-primary-container text-on-primary-fixed font-label-lg text-label-lg rounded tracking-wider shadow-[0_8px_32px_rgba(197,160,89,0.15)] hover:shadow-[0_12px_40px_rgba(197,160,89,0.25)] transition-all duration-300 border border-white/20 active:scale-[0.98]" type="submit">
                SIGN IN
            </button>
<!-- Request Access Link -->
<div class="mt-8 text-center border-t border-outline-variant/30 pt-8">
<p class="font-body-md text-body-md text-secondary mb-3">Not a member yet?</p>
<a class="inline-flex items-center gap-2 font-label-lg text-label-lg text-primary hover:text-primary-container transition-colors uppercase tracking-widest group" href="#">
                    Request Access
                    <span class="material-symbols-outlined text-[18px] group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</a>
</div>
</form>
