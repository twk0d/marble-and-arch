<style>
        .glass-panel {
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(153, 143, 130, 0.2);
        }
        
        .input-elegant {
            background: transparent;
            border: none;
            border-bottom: 2px solid theme('colors.secondary-container');
            border-radius: 0;
            padding-left: 0;
            padding-right: 0;
            transition: border-color 0.3s ease;
        }
        .input-elegant:focus {
            outline: none;
            box-shadow: none;
            border-bottom-color: theme('colors.primary');
        }
        .input-elegant::placeholder {
            color: theme('colors.outline');
        }
        
        .floating-label-group {
            position: relative;
            margin-bottom: 2rem;
        }
        .floating-label-group input {
            padding-top: 1.5rem;
            padding-bottom: 0.5rem;
            width: 100%;
        }
        .floating-label-group label {
            position: absolute;
            top: 1rem;
            left: 0;
            transition: all 0.2s ease-out;
            pointer-events: none;
            color: theme('colors.outline');
        }
        .floating-label-group input:focus + label,
        .floating-label-group input:not(:placeholder-shown) + label {
            top: -0.5rem;
            font-size: 0.75rem;
            color: theme('colors.primary');
        }

        .ambient-shadow {
            box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation (Suppressed intent: Transactional Flow - Close/Back implies departure) -->
<!-- We will provide a simplified header for the flow -->
<header class="w-full py-6 px-margin-mobile md:px-margin-desktop flex justify-between items-center max-w-container-max mx-auto z-50">
<div class="font-headline-sm text-headline-sm font-semibold tracking-tight text-on-surface">
            Marble &amp; Arch
        </div>
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors">
<span class="font-label-lg text-label-lg">Save &amp; Exit</span>
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-12 md:py-24">
<div class="w-full max-w-3xl">
<!-- Stepper -->
<div class="mb-16 flex items-center justify-center space-x-4 md:space-x-8">
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full border border-primary flex items-center justify-center text-primary bg-surface-bright">
<span class="material-symbols-outlined" data-icon="check">check</span>
</div>
<span class="font-label-sm text-label-sm text-outline">Details</span>
</div>
<div class="h-px w-12 md:w-24 bg-primary"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full bg-primary flex items-center justify-center text-on-primary ambient-shadow">
<span class="font-label-lg text-label-lg">2</span>
</div>
<span class="font-label-sm text-label-sm text-primary font-semibold">Address</span>
</div>
<div class="h-px w-12 md:w-24 bg-secondary-container"></div>
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full border border-secondary-container flex items-center justify-center text-outline bg-surface">
<span class="font-label-lg text-label-lg">3</span>
</div>
<span class="font-label-sm text-label-sm text-outline">Media</span>
</div>
</div>
<!-- Content Area -->
<div class="glass-panel rounded-xl p-8 md:p-16 ambient-shadow relative overflow-hidden">
<!-- Subtle background decorative element -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary-fixed opacity-10 rounded-full blur-3xl -mr-32 -mt-32 pointer-events-none"></div>
<div class="mb-12">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg mb-4 text-on-surface">Property Location</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Please provide the exact address of the estate.</p>
</div>
<form class="space-y-8 relative z-10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-2">
<div class="floating-label-group md:col-span-1">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="zipcode" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="zipcode">ZIP Code / CEP</label>
</div>
<div class="hidden md:block md:col-span-1 flex items-end pb-8">
<!-- Spacer or optional auto-fill indicator -->
</div>
<div class="floating-label-group md:col-span-2">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="street" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="street">Street Address</label>
</div>
<div class="floating-label-group">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="number" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="number">Number</label>
</div>
<div class="floating-label-group">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="complement" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="complement">Complement (Apt, Suite)</label>
</div>
<div class="floating-label-group md:col-span-2">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="neighborhood" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="neighborhood">Neighborhood</label>
</div>
<div class="floating-label-group">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="city" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="city">City</label>
</div>
<div class="floating-label-group">
<input class="input-elegant font-body-lg text-body-lg text-on-surface" id="state" placeholder=" " type="text">
<label class="font-label-lg text-label-lg" for="state">State / Province</label>
</div>
</div>
</form>
</div>
<!-- Navigation Buttons -->
<div class="mt-12 flex justify-between items-center">
<button class="flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors py-4 px-6 rounded-lg hover:bg-surface-container-low">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
<span class="font-label-lg text-label-lg">Back</span>
</button>
<button class="bg-primary text-on-primary font-label-lg text-label-lg py-4 px-10 rounded-lg flex items-center gap-2 border border-white/10 ambient-shadow hover:bg-primary-fixed transition-all duration-300">
<span>Continue</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
</main>
<!-- Footer Suppressed for Transactional Flow -->
</body></html>
