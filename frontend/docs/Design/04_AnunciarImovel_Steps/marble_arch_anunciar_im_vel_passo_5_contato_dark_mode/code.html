<style>
        .glass-panel {
            background: rgba(28, 27, 27, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .ambient-shadow {
            box-shadow: 0 32px 64px -16px rgba(0, 0, 0, 0.5);
        }

        .input-floating-label {
            position: relative;
        }

        .input-floating-label input, .input-floating-label select {
            width: 100%;
            border: none;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            background: transparent;
            padding: 24px 0 8px 0;
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .input-floating-label input:focus, .input-floating-label select:focus {
            outline: none;
            border-bottom-color: theme('colors.primary');
            box-shadow: none;
        }

        .input-floating-label label {
            position: absolute;
            top: 24px;
            left: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.6);
            font-family: theme('fontFamily.label-sm');
            font-size: theme('fontSize.label-sm')[0];
            letter-spacing: theme('fontSize.label-sm')[1].letterSpacing;
            font-weight: theme('fontSize.label-sm')[1].fontWeight;
        }

        .input-floating-label input:focus ~ label,
        .input-floating-label input:not(:placeholder-shown) ~ label,
        .input-floating-label select:focus ~ label,
        .input-floating-label select:not([value=""]) ~ label {
            top: 0;
            color: theme('colors.primary-fixed-dim');
            font-size: 10px;
        }
        
        /* Specific override for select placeholder styling to match float logic */
        .input-floating-label select option[value=""][disabled] {
            display: none;
        }
        
        .input-floating-label select option {
            background-color: #1c1b1b;
            color: #ffffff;
        }
      </style>
</head>
<body class="bg-[#131313] text-[#fcf9f8] antialiased min-h-screen flex flex-col">
<!-- TopNavBar (Nav suppressed due to transactional flow, but brand header kept) -->

<a class="font-headline-sm text-headline-sm font-semibold tracking-tight text-[#fcf9f8]" href="#">Marble &amp; Arch</a>
<a class="font-label-lg text-label-lg text-white/70 hover:text-primary-fixed transition-colors duration-300 flex items-center gap-2" href="#">
<span class="material-symbols-outlined text-[18px]">close</span>
            Exit
        </a>
</header>
<main class="flex-grow pt-32 pb-24 px-margin-mobile md:px-margin-desktop max-w-container-max mx-auto w-full flex flex-col items-center justify-center">
<div class="w-full max-w-[800px]">
<!-- Stepper -->
<div class="mb-16">
<div class="flex items-center justify-between relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-[1px] bg-white/20 z-0"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-[100%] h-[1px] bg-primary z-0 transition-all duration-500"></div>
<!-- Steps -->
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-sm text-label-sm">
<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim hidden md:block">Details</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">

<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim hidden md:block">Location</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">

</div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim hidden md:block">Specs</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">

<span class="material-symbols-outlined text-[16px]">check</span>
</div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim hidden md:block">Media</span>
</div>
<div class="relative z-10 flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-label-sm text-label-sm ring-4 ring-primary-container/20">
                            5
                        </div>
<span class="font-label-sm text-label-sm text-primary-fixed-dim font-semibold hidden md:block">Contact</span>
</div>
</div>

<!-- Content Area -->
<div class="glass-panel ambient-shadow rounded-xl p-8 md:p-16">
<div class="mb-12 text-center">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-white mb-4">Owner Information</h1>
<p class="font-body-lg text-body-lg text-white/70 max-w-[500px] mx-auto">Please provide your contact details so our curators can reach out regarding your property submission.</p>
</div>
<form class="space-y-10">
<div class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-gutter">
<div class="input-floating-label">
<input class="font-body-md text-body-md" id="firstName" placeholder=" " required="" type="text">
<label for="firstName">First Name</label>
</div>
<div class="input-floating-label">
<input class="font-body-md text-body-md" id="lastName" placeholder=" " required="" type="text">
<label for="lastName">Last Name</label>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-10 md:gap-gutter">
<div class="input-floating-label">
<input class="font-body-md text-body-md" id="email" placeholder=" " required="" type="email">
<label for="email">Email Address</label>
</div>
<div class="input-floating-label">
<input class="font-body-md text-body-md" id="phone" placeholder=" " required="" type="tel">
<label for="phone">Phone Number</label>
</div>
</div>
<div class="input-floating-label">
<select class="font-body-md text-body-md bg-transparent appearance-none" id="contactTime" required="">
<option disabled="" selected="" value=""></option>
<option value="morning">Morning (9AM - 12PM)</option>
<option value="afternoon">Afternoon (12PM - 5PM)</option>
<option value="evening">Evening (5PM - 8PM)</option>
<option value="anytime">Anytime</option>
</select>
<label for="contactTime">Preferred Contact Time</label>
<span class="material-symbols-outlined absolute right-0 top-[24px] pointer-events-none text-white/60">expand_more</span>
</div>
<div class="pt-8 border-t border-white/10 mt-12 flex justify-between items-center">
<button class="font-label-lg text-label-lg text-white/70 hover:text-white transition-colors flex items-center gap-2 py-3 px-6 rounded-lg hover:bg-white/5" type="button">
<span class="material-symbols-outlined">arrow_back</span>
                            Back
                        </button>
<button class="font-label-lg text-label-lg bg-primary-fixed text-on-primary-fixed border border-white/10 px-8 py-4 rounded-lg hover:shadow-[0_8px_24px_-8px_rgba(233,193,118,0.3)] transition-all duration-300 flex items-center gap-2" type="submit">
                            Submit Property
                            <span class="material-symbols-outlined">check</span>
</button>
</div>
</form>
</div>
</div>
</main>
<script>
        // Simple script to handle select floating label logic
        document.querySelectorAll('select').forEach(select => {
            select.addEventListener('change', function() {
                if(this.value !== "") {
                    this.setAttribute('data-filled', 'true');
                }
            });
        });
    </script>
