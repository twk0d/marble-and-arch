<script>
        // Simple script to handle chip selection toggling for demo purposes
        document.addEventListener('DOMContentLoaded', () => {
            const rows = document.querySelectorAll('.flex.overflow-x-auto');
            
            rows.forEach(row => {
                const buttons = row.querySelectorAll('button');
                buttons.forEach(btn => {
                    btn.addEventListener('click', () => {
                        // Remove active class from all in this row
                        buttons.forEach(b => {
                            b.classList.remove('chip-active');
                            b.classList.add('chip-inactive');
                        });
                        // Add active class to clicked
                        btn.classList.remove('chip-inactive');
                        btn.classList.add('chip-active');
                    });
                });
            });
        });
    </script>
